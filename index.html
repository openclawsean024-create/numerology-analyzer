<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生命靈數分析器 | 探索你的數字密碼</title>
  <meta name="description" content="輸入姓名與出生年月日，透過生命靈數了解你的性格特質、事業方向與年度流年运势。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    /* ===== DESIGN TOKENS ===== */
    :root {
      /* Cosmic Night 配色 */
      --bg-deep: #07071a;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --bg-glass: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.15);
      
      /* Brand */
      --primary: #a78bfa;
      --primary-glow: rgba(167,139,250,0.35);
      --primary-dim: #7c3aed;
      --accent: #fbbf24;
      --accent-glow: rgba(251,191,36,0.3);
      
      /* Text */
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      
      /* Semantic */
      --success: #34d399;
      --error: #f87171;
      --info: #60a5fa;
      
      /* Surfaces */
      --surface-1: rgba(255,255,255,0.03);
      --surface-2: rgba(255,255,255,0.06);
      
      /* Radii */
      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 24px;
      --r-xl: 32px;
      --r-full: 9999px;
      
      /* Shadows */
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-lg: 0 24px 64px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 40px var(--primary-glow);
      
      /* Transitions */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --t-fast: 150ms;
      --t-base: 280ms;
      --t-slow: 480ms;
    }
    
    /* ===== LIGHT THEME OVERRIDE ===== */
    @media (prefers-color-scheme: light) {
      :root {
        --bg-deep: #f0f4ff;
        --bg-card: rgba(255,255,255,0.85);
        --bg-card-hover: rgba(255,255,255,0.95);
        --bg-glass: rgba(255,255,255,0.7);
        --border: rgba(99,102,241,0.12);
        --border-bright: rgba(99,102,241,0.25);
        --primary: #7c3aed;
        --primary-glow: rgba(124,58,237,0.2);
        --primary-dim: #5b21b6;
        --accent: #d97706;
        --accent-glow: rgba(217,119,6,0.2);
        --text: #1e1b4b;
        --text-muted: #6b7280;
        --text-dim: #9ca3af;
        --surface-1: rgba(99,102,241,0.04);
        --surface-2: rgba(99,102,241,0.08);
        --shadow-sm: 0 2px 8px rgba(99,102,241,0.1);
        --shadow-md: 0 8px 32px rgba(99,102,241,0.12);
        --shadow-lg: 0 24px 64px rgba(99,102,241,0.15);
        --shadow-glow: 0 0 40px var(--primary-glow);
      }
    }
    
    /* ===== BODY & LAYOUT ===== */
    body {
      font-family: 'Noto Sans TC', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    
    /* Cosmic background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,58,237,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(167,139,250,0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 15% 70%, rgba(251,191,36,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    @media (prefers-color-scheme: light) {
      body::before {
        background:
          radial-gradient(ellipse 80% 60% at 50% -5%, rgba(167,139,250,0.12) 0%, transparent 55%);
      }
    }
    
    .container {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    
    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 48px 0 40px;
    }
    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s var(--ease-out) 0.1s forwards;
    }
    .header-eyebrow span {
      width: 24px;
      height: 1px;
      background: var(--primary);
      opacity: 0.6;
    }
    header h1 {
      font-size: clamp(1.75rem, 6vw, 2.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 40%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.6s var(--ease-out) 0.2s forwards;
    }
    header p {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.6s var(--ease-out) 0.3s forwards;
    }
    
    /* ===== CARDS ===== */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 28px 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-md);
      opacity: 0;
      animation: fadeUp 0.6s var(--ease-out) forwards;
    }
    .card:nth-child(2) { animation-delay: 0.35s; }
    .card:nth-child(3) { animation-delay: 0.5s; }
    
    /* ===== INPUT SECTION ===== */
    #inputSection { animation-delay: 0.2s; }
    
    .form-header {
      margin-bottom: 24px;
    }
    .form-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .form-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    
    /* ===== INPUT GROUPS ===== */
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }
    .field label .icon {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }
    
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      padding: 14px 18px;
      background: var(--surface-1);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      transition: border-color var(--t-base) var(--ease-out),
                  box-shadow var(--t-base) var(--ease-out),
                  background var(--t-base);
      outline: none;
    }
    .input-wrap input::placeholder { color: var(--text-dim); }
    .input-wrap input:focus {
      border-color: var(--primary);
      background: var(--surface-2);
      box-shadow: 0 0 0 3px var(--primary-glow), var(--shadow-sm);
    }
    
    /* Date row */
    .date-row {
      display: grid;
      grid-template-columns: 1fr 0.65fr 0.65fr;
      gap: 10px;
    }
    .date-row .input-wrap input { text-align: center; }
    .date-row .input-wrap:first-child input { text-align: left; }
    
    /* Field errors */
    .field-error {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--error);
      margin-top: 6px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity var(--t-fast), transform var(--t-fast);
      pointer-events: none;
    }
    .field-error.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 15px 28px;
      border: none;
      border-radius: var(--r-md);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--t-base) var(--ease-out);
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity var(--t-fast);
    }
    .btn:hover::after { opacity: 1; }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dim) 100%);
      color: white;
      box-shadow: 0 4px 20px var(--primary-glow);
      width: 100%;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--primary-glow);
    }
    .btn-primary:active { transform: translateY(0); }
    
    .btn-ghost {
      background: var(--surface-1);
      color: var(--text-muted);
      border: 1.5px solid var(--border);
      flex: 1;
    }
    .btn-ghost:hover {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--border-bright);
      transform: translateY(-1px);
    }
    
    .btn-icon {
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: var(--r-sm);
      background: var(--surface-1);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1rem;
      flex: none;
    }
    .btn-icon:hover {
      background: var(--surface-2);
      color: var(--primary);
      border-color: var(--primary);
    }
    
    /* ===== REPORT ===== */
    #report { display: none; }
    #report.show { display: block; }
    
    .report-header {
      text-align: center;
      padding: 8px 0 24px;
    }
    .report-header .report-name {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .report-header .report-date {
      font-size: 0.82rem;
      color: var(--text-dim);
    }
    
    /* ===== SECTION HEADERS ===== */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-glow), transparent);
      border-radius: var(--r-sm);
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .section-badge {
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--r-full);
      background: var(--primary-glow);
      color: var(--primary);
      letter-spacing: 0.05em;
    }
    
    /* ===== NUMBERS GRID ===== */
    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 8px;
    }
    @media (max-width: 480px) {
      .numbers-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .numbers-grid .number-card:nth-child(4),
      .numbers-grid .number-card:nth-child(5) { grid-column: span 1; }
    }
    @media (max-width: 360px) {
      .numbers-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    .number-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 8px 12px;
      text-align: center;
      transition: all var(--t-base) var(--ease-out);
      position: relative;
      overflow: hidden;
    }
    .number-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0;
      transition: opacity var(--t-base);
    }
    .number-card:hover {
      background: var(--surface-2);
      border-color: var(--border-bright);
      transform: translateY(-2px);
    }
    .number-card:hover::before { opacity: 1; }
    
    .number-card .label {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .number-card .value {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
      margin-bottom: 2px;
    }
    .number-card .sub {
      font-size: 0.6rem;
      color: var(--text-dim);
      opacity: 0.7;
    }
    
    /* ===== REPORT TEXT ===== */
    .report-text {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.85;
      margin-bottom: 10px;
    }
    .report-text strong { color: var(--text); font-weight: 600; }
    
    /* ===== KEYWORDS ===== */
    .keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }
    .keyword {
      padding: 5px 13px;
      border-radius: var(--r-full);
      font-size: 0.78rem;
      font-weight: 500;
      background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(167,139,250,0.08));
      color: var(--primary);
      border: 1px solid rgba(167,139,250,0.2);
      transition: all var(--t-fast);
    }
    .keyword:hover {
      background: linear-gradient(135deg, rgba(167,139,250,0.25), rgba(167,139,250,0.15));
      transform: translateY(-1px);
    }
    
    /* ===== LOVE LIST ===== */
    .advice-list {
      list-style: none;
      margin-top: 8px;
    }
    .advice-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
      border-bottom: 1px solid var(--border);
    }
    .advice-list li:last-child { border-bottom: none; }
    .advice-list li::before {
      content: '✦';
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 2px;
      font-size: 0.7rem;
    }
    
    /* ===== PERSONAL YEAR HERO ===== */
    .year-hero {
      background: linear-gradient(135deg, rgba(167,139,250,0.1) 0%, rgba(251,191,36,0.06) 100%);
      border: 1px solid var(--border-bright);
      border-radius: var(--r-md);
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
    }
    .year-number {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 4px;
    }
    .year-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    
    /* ===== RADAR CHART ===== */
    .radar-wrap {
      display: flex;
      justify-content: center;
      margin: 16px 0 8px;
    }
    #radarCanvas {
      width: 100%;
      max-width: 300px;
      height: auto;
      display: block;
    }
    
    /* ===== ACTION ROW ===== */
    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    /* ===== SHARE ===== */
    .share-box {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 16px;
      margin-top: 12px;
      display: none;
    }
    .share-box.show { display: block; }
    .share-url {
      font-size: 0.78rem;
      color: var(--primary);
      word-break: break-all;
      line-height: 1.5;
    }
    .share-url-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    
    /* ===== COPY TOAST ===== */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg-deep);
      padding: 12px 28px;
      border-radius: var(--r-full);
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      transition: transform var(--t-base) var(--ease-spring);
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    
    /* ===== DECORATIVE ELEMENTS ===== */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 20px 0;
    }
    
    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
    
    /* ===== FOCUS VISIBLE ===== */
    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-radius: 4px;
    }
    
    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    
    .animate-fade-up { animation: fadeUp 0.5s var(--ease-out) forwards; }
    .animate-scale-in { animation: scaleIn 0.4s var(--ease-spring) forwards; }
    
    /* Report sections staggered */
    #report .card { opacity: 0; animation: fadeUp 0.5s var(--ease-out) forwards; }
    #report .card:nth-child(1) { animation-delay: 0.05s; }
    #report .card:nth-child(2) { animation-delay: 0.15s; }
    #report .card:nth-child(3) { animation-delay: 0.25s; }
    #report .card:nth-child(4) { animation-delay: 0.35s; }
    #report .card:nth-child(5) { animation-delay: 0.45s; }
    #report .card:nth-child(6) { animation-delay: 0.55s; }
    
    /* ===== ACCESSIBILITY ===== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border-width: 0;
    }
    
    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .container { padding: 0 16px 40px; }
      header { padding: 32px 0 28px; }
      .card { padding: 22px 18px; border-radius: var(--r-md); }
      .date-row { grid-template-columns: 1fr 0.6fr 0.6fr; }
      .action-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header role="banner">
      <div class="header-eyebrow">
        <span></span>
        Numerology
        <span></span>
      </div>
      <h1>生命靈數分析器</h1>
      <p>探索你的數字密碼，解讀性格與命運</p>
    </header>
    
    <!-- INPUT SECTION -->
    <div class="card" id="inputSection" role="region" aria-label="輸入區塊">
      <div class="form-header">
        <h2>✨ 開始你的探索</h2>
        <p>輸入基本資料，取得完整的生命靈數報告</p>
      </div>
      
      <div class="field">
        <label for="nameInput">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          姓名
        </label>
        <div class="input-wrap">
          <input
            type="text"
            id="nameInput"
            placeholder="例如：王小明 或 John Doe"
            maxlength="50"
            autocomplete="name"
            aria-required="true"
            aria-describedby="nameError"
          >
        </div>

        n = String(n).split('').reduce((a, b) => a + parseInt(b), 0);

      }
      return digitSum(sum);

    function validateInputs() {
      const name = document.getElementById('nameInput').value.trim();

      const month = parseInt(document.getElementById('birthMonth').value);
      const day = parseInt(document.getElementById('birthDay').value);
      
      let valid = true;
      
      if (name.length < 2) {
        document.getElementById('nameError').classList.add('show');
        valid = false;
      } else {
        document.getElementById('nameError').classList.remove('show');
      }
      
      if (!year || !month || !day || month < 1 || month > 12 || day < 1 || day > 31) {
        document.getElementById('dateError').classList.add('show');
        valid = false;
      } else {
        document.getElementById('dateError').classList.remove('show');
      }
      
      return valid ? { name, year, month, day } : null;
    }

              <div class="label">生日數</div>
              <div class="value" aria-label="生日數 ${d.birthday.main}">${d.birthday.main}</div>
              <div class="sub">(${d.birthday.raw})</div>
            </div>
          </div>
        </div>
        
        <!-- Personality -->
        <div class="card">
          <div class="section-header">
            <div class="section-icon">🧠</div>
            <div class="section-title">性格特質</div>
            <div class="section-badge">先天數 ${d.lifePath}</div>
          </div>
          <p class="report-text">${lifePathDesc[d.lifePath] || lifePathDesc[9]}</p>
          <div class="keywords" role="list" aria-label="性格關鍵字">
            ${keywords.map(k => `<span class="keyword" role="listitem">${k}</span>`).join('')}
          </div>
        </div>
        
        <!-- Career -->
        <div class="card">
          <div class="section-header">
            <div class="section-icon">💼</div>
            <div class="section-title">事業方向</div>
            <div class="section-badge">命運數 ${d.destiny}</div>
          </div>
          <p class="report-text">根據你的命運數 <strong>${d.destiny}</strong>，以下方向可能特別適合你：</p>
          <div class="keywords" role="list" aria-label="推薦職業">
            ${careers.map(c => `<span class="keyword" role="listitem">${c}</span>`).join('')}
          </div>
        </div>
        
        <!-- Love -->
        <div class="card">
          <div class="section-header">
            <div class="section-icon">💕</div>
            <div class="section-title">感情建議</div>
            <div class="section-badge">靈魂數 ${d.soul}</div>
          </div>
          <p class="report-text">基於你的靈魂數 <strong>${d.soul}</strong> 與個性數 <strong>${d.personality}</strong>，以下是一些感情相處建議：</p>
          <ul class="advice-list" role="list" aria-label="感情建議">
            ${love.slice(0, 5).map(l => `<li role="listitem">${l}</li>`).join('')}
          </ul>
        </div>
        
        <!-- Personal Year -->
        <div class="card">
          <div class="section-header">
            <div class="section-icon">🔮</div>
            <div class="section-title">${currentYear} 年度流年</div>
          </div>
          <div class="year-hero">
            <div class="year-number" aria-label="流年數 ${d.personalYear}">${d.personalYear}</div>
            <div class="year-label">Personal Year · 流年數</div>
          </div>
          <p class="report-text">${yearMeanings[d.personalYear] || yearMeanings[9]}</p>
        </div>
        
        <!-- Radar Chart -->
        <div class="card">
          <div class="section-header">
            <div class="section-icon">🕸️</div>
            <div class="section-title">性格雷達圖</div>
          </div>
          <div class="radar-wrap">
            <canvas id="radarCanvas" width="300" height="300" role="img" aria-label="性格雷達圖"></canvas>
          </div>
        </div>
        
        <!-- Actions -->
        <div class="card">
          <div class="action-row">
            <button class="btn btn-ghost" onclick="copyReport()" aria-label="複製完整文字報告">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              複製報告
            </button>
            <button class="btn btn-ghost" onclick="shareReport()" aria-label="生成分享連結">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              分享連結
            </button>
          </div>
          <div class="share-box" id="shareBox" role="region" aria-label="分享連結">
            <div class="share-url-label">你的分享連結</div>
            <div class="share-url" id="shareUrl"></div>
          </div>
          <button class="btn btn-primary" onclick="resetAnalysis()" style="margin-top:12px" aria-label="重新分析">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
            重新分析
          </button>
        </div>
      `;
      
      // Draw radar after DOM is ready
      setTimeout(() => drawRadar(d), 50);
    }
    
    /* ======================================================
       RADAR CHART
    ====================================================== */
    function drawRadar(d) {
      const canvas = document.getElementById('radarCanvas');
      if (!canvas) return;
      
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const size = 300;
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.scale(dpr, dpr);
      
      const w = size, h = size;
      const cx = w / 2, cy = h / 2;
      const r = Math.min(w, h) / 2 - 50;
      
      ctx.clearRect(0, 0, w, h);
      
      const isDark = !window.matchMedia('(prefers-color-scheme: light)').matches;
      const labelColor = isDark ? '#94a3b8' : '#6b7280';
      const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(99,102,241,0.1)';
      const fillColor = isDark ? 'rgba(167,139,250,0.18)' : 'rgba(124,58,237,0.12)';
      const strokeColor = isDark ? '#a78bfa' : '#7c3aed';
      const dotColor = isDark ? '#c4b5fd' : '#7c3aed';
      
      const labels = ['膽識','創造力','直覺','執行力','情感','理性'];
      const values = [
        d.lifePath / 9,
        d.destiny / 9,
        d.soul / 9,
        d.personality / 9,
        d.birthday.main / 9,
        (11 - d.lifePath % 10) / 9
      ];
      
      const n = 6;
      const step = (Math.PI * 2) / n;
      
      // Rings
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 1;
      for (let ring = 1; ring <= 3; ring++) {
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
          const angle = i * step - Math.PI / 2;
          const pr = (r / 3) * ring;
          const x = cx + pr * Math.cos(angle);
          const y = cy + pr * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }
      
      // Axes + labels
      for (let i = 0; i < n; i++) {
        const angle = i * step - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
        ctx.strokeStyle = gridColor;
        ctx.lineWidth = 1;
        ctx.stroke();
        
        ctx.fillStyle = labelColor;
        ctx.font = '11px "Noto Sans TC", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const lx = cx + (r + 22) * Math.cos(angle);
        const ly = cy + (r + 22) * Math.sin(angle);
        ctx.fillText(labels[i], lx, ly);
      }
      
      // Data polygon
      ctx.beginPath();
      for (let i = 0; i <= n; i++) {
        const idx = i % n;
        const angle = idx * step - Math.PI / 2;
        const pr = Math.max(0, Math.min(1, values[idx])) * r;
        const x = cx + pr * Math.cos(angle);
        const y = cy + pr * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = fillColor;
      ctx.fill();
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Data points
      for (let i = 0; i < n; i++) {
        const angle = i * step - Math.PI / 2;
        const pr = Math.max(0, Math.min(1, values[i])) * r;
        const x = cx + pr * Math.cos(angle);
        const y = cy + pr * Math.sin(angle);
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = dotColor;
        ctx.fill();
        ctx.strokeStyle = isDark ? '#1e1b4b' : '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }
    
    /* ======================================================
       COPY & SHARE
    ====================================================== */
    function copyReport() {
      if (!currentData) return;
      const d = currentData;
      const love = loveAdvice[d.soul] || loveAdvice[9];
      let text = `✨ 生命靈數分析報告\n`;
      text += `姓名：${d.name}\n`;
      text += `出生：${d.year}/${d.month}/${d.day}\n\n`;
      text += `【五大核心數字】\n`;
      text += `先天數(Life Path)：${d.lifePath}\n`;
      text += `命運數(Expression)：${d.destiny}\n`;
      text += `靈魂數(Soul Urge)：${d.soul}\n`;
      text += `個性數(Personality)：${d.personality}\n`;
      text += `生日數(Birthday)：${d.birthday.main}（${d.birthday.raw}日）\n\n`;
      text += `【性格特質】\n${lifePathDesc[d.lifePath] || ''}\n\n`;
      text += `【事業方向】\n${(careerRecs[d.destiny] || []).join('、')}\n\n`;
      text += `【感情建議】\n${love.slice(0, 5).map(l => '• ' + l).join('\n')}\n\n`;
      text += `【${currentYear}年度流年】(${d.personalYear})\n${yearMeanings[d.personalYear] || ''}\n\n`;
      text += `產生於生命靈數分析器`;
      
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
      });
    }
    
    function shareReport() {
      if (!currentData) return;
      const d = currentData;
      const params = new URLSearchParams({ n: d.name, y: d.year, m: d.month, d: d.day });
      const url = `${location.origin}${location.pathname}?${params.toString()}`;
      const box = document.getElementById('shareBox');
      document.getElementById('shareUrl').textContent = url;
      box.classList.add('show');
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function resetAnalysis() {
      document.getElementById('inputSection').style.display = 'block';
      document.getElementById('report').classList.remove('show');
      document.getElementById('report').innerHTML = '';
      document.getElementById('nameInput').value = '';
      document.getElementById('birthYear').value = '';
      document.getElementById('birthMonth').value = '';
      document.getElementById('birthDay').value = '';
      document.getElementById('nameError').classList.remove('show');
      document.getElementById('dateError').classList.remove('show');
      currentData = null;
      document.getElementById('nameInput').focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    /* ======================================================
       URL PARAMS
    ====================================================== */
    function checkUrlParams() {
      const params = new URLSearchParams(location.search);
      if (params.has('n') && params.has('y') && params.has('m') && params.has('d')) {
        document.getElementById('nameInput').value = params.get('n') || '';
        document.getElementById('birthYear').value = params.get('y') || '';
        document.getElementById('birthMonth').value = params.get('m') || '';
        document.getElementById('birthDay').value = params.get('d') || '';
        // Small delay to let page render
        setTimeout(analyze, 300);
      }
    }
    
    checkUrlParams();
    
    // Redraw radar on resize
    window.addEventListener('resize', () => {
      if (currentData) drawRadar(currentData);
    });
  </script>
