<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生命靈數分析器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --secondary: #f59e0b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --radius: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #334155;
        --shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      line-height: 1.6;
    }
    .container { max-width: 640px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.75rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
    header p { color: var(--text-muted); font-size: 0.95rem; }
    
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.9rem; }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      background: var(--card-bg);
      color: var(--text);
      transition: border-color 0.2s;
    }
    .input-group input:focus { outline: none; border-color: var(--primary); }
    .date-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: var(--text-muted); color: white; }
    
    .error { color: #ef4444; font-size: 0.85rem; margin-top: 6px; display: none; }
    .error.show { display: block; }
    
    #report { display: none; }
    #report.show { display: block; }
    
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 24px 0 12px;
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
      padding-bottom: 6px;
    }
    
    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .number-card {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
    }
    .number-card .label { font-size: 0.75rem; opacity: 0.9; margin-bottom: 4px; }
    .number-card .value { font-size: 2.5rem; font-weight: 700; line-height: 1.1; }
    .number-card .sub { font-size: 0.7rem; opacity: 0.8; margin-top: 4px; }
    
    .report-text { font-size: 0.95rem; line-height: 1.8; margin-bottom: 12px; }
    .keywords { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
    .keyword {
      background: var(--primary-light);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    
    #radarCanvas { width: 100%; max-width: 320px; margin: 16px auto; display: block; }
    
    .action-row { display: flex; gap: 12px; margin-top: 20px; }
    .action-row .btn { flex: 1; }
    
    .share-url {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.8rem;
      word-break: break-all;
      margin-top: 12px;
      display: none;
    }
    .share-url.show { display: block; }
    
    .copy-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: transform 0.3s;
      z-index: 100;
    }
    .copy-toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

      </div>
      
      <div class="input-group">
        <label>出生日期</label>
        <div class="date-row">
          <input type="number" id="birthYear" placeholder="年" min="1900" max="2026">

          <input type="number" id="birthDay" placeholder="日" min="1" max="31">
        </div>
        <div class="error" id="dateError">請填寫完整的出生年月日</div>
      </div>
      
      <button class="btn btn-primary" onclick="analyze()">🔮 開始分析</button>
    </div>
    
    <div id="report">
      <div class="card">
        <h2 class="section-title">📊 五大核心數字</h2>
        <div class="numbers-grid" id="numbersGrid"></div>

        <div id="yearSection"></div>
        
        <h2 class="section-title">🕸️ 性格雷達圖</h2>
        <canvas id="radarCanvas" width="320" height="320"></canvas>
        
        <div class="action-row">
          <button class="btn btn-secondary" onclick="copyReport()">📋 複製報告</button>
          <button class="btn btn-secondary" onclick="shareReport()">🔗 分享連結</button>
        </div>
        <div class="share-url" id="shareUrl"></div>
        <button class="btn btn-primary" onclick="resetAnalysis()" style="margin-top:12px">🔄 重新分析</button>
      </div>
    </div>
  </div>

    function getStroke(ch) {
      if (/[a-zA-Z]/.test(ch)) return 1;
      if (/[0-9]/.test(ch)) return 0;
      return strokes[ch] || 0;
    }
    
    function isVowel(ch) {
      return vowelChars.includes(ch);
    }
    
    function isConsonant(ch) {
      return consonants.includes(ch);
    }
    
    function digitSum(n) {
      while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
        n = String(n).split('').reduce((a, b) => a + parseInt(b), 0);
      }
      return n;
    }
    
    function calcLifePath(y, m, d) {
      return digitSum(y + m + d);

      let sum = 0;
      for (const ch of name) {
        if (/[a-zA-Z]/.test(ch)) {
          const code = ch.toUpperCase().charCodeAt(0) - 64;
          sum += code;
        } else {
          sum += getStroke(ch);
        }
      }
      return digitSum(sum);
    }
    
    function calcSoul(name) {
      let sum = 0;
      for (const ch of name) {
        if (/[a-zA-Z]/.test(ch)) {
          if (isVowel(ch)) sum += ch.toUpperCase().charCodeAt(0) - 64;
        } else {
          if (isVowel(ch)) sum += getStroke(ch);
        }
      }
      return digitSum(sum);
    }
    
    function calcPersonality(name) {

      for (const ch of name) {
        if (/[a-zA-Z]/.test(ch)) {
          if (isConsonant(ch)) sum += ch.toUpperCase().charCodeAt(0) - 64;
        } else {
          if (!isVowel(ch) && getStroke(ch) > 0) sum += getStroke(ch);
        }
      }
      return digitSum(sum);
    }

      9: '今年是結束與放下的一年。過去的某些章節將畫上句點，某些關係或事業可能終結。這是蛻变的阵痛期，為新的開始騰出空間。',
      11: '今年是靈性覺醒的高峰年。直覺將異常敏銳，可能接收到重要的靈感或預言。保持靜心與開放，信任內在的聲音，你的天命正在展現。',
      22: '今年是實踐大計畫的年份。你有機會完成具有長期影響力的重要事項。善用你的組織能力，與志同道合的人合作，實現宏大的願景。',
      33: '今年是靈性奉獻的年份。你的存在將對他人產生深遠的影響。疗愈和教導的能量很強，但需注意自己的身心狀態，避免過度透支。'
    };
    
    const currentYear = 2026;
    
    let currentData = null;
    
    function validateInputs() {
      const name = document.getElementById('nameInput').value.trim();
      const year = parseInt(document.getElementById('birthYear').value);
      const month = parseInt(document.getElementById('birthMonth').value);
      const day = parseInt(document.getElementById('birthDay').value);
      
      let valid = true;
      
      if (name.length < 2) {
        document.getElementById('nameError').classList.add('show');
        valid = false;
      } else {
        document.getElementById('nameError').classList.remove('show');
      }
      
      if (!year || !month || !day || month < 1 || month > 12 || day < 1 || day > 31) {
        document.getElementById('dateError').classList.add('show');
        valid = false;
      } else {
        document.getElementById('dateError').classList.remove('show');
      }
      
      return valid ? { name, year, month, day } : null;
    }
    
    function analyze() {
      const data = validateInputs();
      if (!data) return;
      
      const lifePath = calcLifePath(data.year, data.month, data.day);
      const destiny = calcDestiny(data.name);
      const soul = calcSoul(data.name);
      const personality = calcPersonality(data.name);
      const birthday = calcBirthday(data.day);
      const personalYear = digitSum(lifePath + currentYear);
      
      currentData = {
        name: data.name,
        year: data.year,
        month: data.month,
        day: data.day,
        lifePath, destiny, soul, personality, birthday, personalYear
      };
      
      renderReport(currentData);
      document.getElementById('inputSection').style.display = 'none';
      document.getElementById('report').classList.add('show');
    }
    
    function renderReport(d) {
      // Numbers grid
      const grid = document.getElementById('numbersGrid');
      grid.innerHTML = `
        <div class="number-card"><div class="label">先天數</div><div class="value">${d.lifePath}</div><div class="sub">Life Path</div></div>
        <div class="number-card"><div class="label">命運數</div><div class="value">${d.destiny}</div><div class="sub">Expression</div></div>
        <div class="number-card"><div class="label">靈魂數</div><div class="value">${d.soul}</div><div class="sub">Soul Urge</div></div>
        <div class="number-card"><div class="label">個性數</div><div class="value">${d.personality}</div><div class="sub">Personality</div></div>
        <div class="number-card"><div class="label">生日數</div><div class="value">${d.birthday.main}</div><div class="sub">(${d.birthday.raw})</div></div>
      `;
      
      // Personality
      const keywords = personalityKeywords[d.lifePath] || personalityKeywords[9];
      document.getElementById('personalitySection').innerHTML = `
        <p class="report-text">${lifePathDesc[d.lifePath] || lifePathDesc[9]}</p>
        <div class="keywords">${keywords.map(k => `<span class="keyword">${k}</span>`).join('')}</div>
      `;
      
      // Career
      const careers = careerRecs[d.destiny] || careerRecs[9];
      document.getElementById('careerSection').innerHTML = `
        <p class="report-text">根據你的命運數 ${d.destiny}，以下方向可能特別適合你：</p>
        <div class="keywords">${careers.map(c => `<span class="keyword">${c}</span>`).join('')}</div>
      `;
      
      // Love
      const love = loveAdvice[d.soul] || loveAdvice[d.personality] || loveAdvice[9];
      document.getElementById('loveSection').innerHTML = `
        <p class="report-text">基於你的靈魂數 ${d.soul} 與個性數 ${d.personality}，以下是一些感情相處建議：</p>
        <ul style="padding-left:20px;margin-top:8px;">
          ${love.slice(0, 5).map(l => `<li class="report-text" style="margin-bottom:4px">${l}</li>`).join('')}
        </ul>
      `;
      
      // Year
      document.getElementById('yearSection').innerHTML = `
        <p class="report-text"><strong>流年數：${d.personalYear}</strong></p>
        <p class="report-text">${yearMeanings[d.personalYear] || yearMeanings[9]}</p>
      `;
      
      // Radar
      drawRadar(d);
    }
    
    function drawRadar(d) {
      const canvas = document.getElementById('radarCanvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const r = Math.min(w, h) / 2 - 40;
      
      ctx.clearRect(0, 0, w, h);
      
      const labels = ['膽識', '創造力', '直覺', '執行力', '情感', '理性'];
      const values = [
        d.lifePath / 9,
        d.destiny / 9,
        d.soul / 9,
        d.personality / 9,
        d.birthday.main / 9,
        (11 - d.lifePath % 10) / 9
      ];
      
      const n = 6;
      const step = (Math.PI * 2) / n;
      
      // Draw rings
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#e2e8f0';
      ctx.lineWidth = 1;
      for (let ring = 1; ring <= 3; ring++) {
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
          const angle = i * step - Math.PI / 2;
          const pr = (r / 3) * ring;
          const x = cx + pr * Math.cos(angle);
          const y = cy + pr * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      
      // Draw axes
      for (let i = 0; i < n; i++) {
        const angle = i * step - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
        ctx.stroke();
        
        // Labels
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#1e293b';
        ctx.font = '12px "Noto Sans TC"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const lx = cx + (r + 20) * Math.cos(angle);
        const ly = cy + (r + 20) * Math.sin(angle);
        ctx.fillText(labels[i], lx, ly);
      }
      
      // Draw data polygon
      ctx.beginPath();
      for (let i = 0; i <= n; i++) {
        const idx = i % n;
        const angle = idx * step - Math.PI / 2;
        const pr = values[idx] * r;
        const x = cx + pr * Math.cos(angle);
        const y = cy + pr * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.fillStyle = 'rgba(99, 102, 241, 0.3)';
      ctx.fill();
      ctx.strokeStyle = '#6366f1';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Data points
      for (let i = 0; i < n; i++) {
        const angle = i * step - Math.PI / 2;
        const pr = values[i] * r;
        const x = cx + pr * Math.cos(angle);
        const y = cy + pr * Math.sin(angle);
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#6366f1';
        ctx.fill();
      }
    }
    
    function copyReport() {
      if (!currentData) return;
      const d = currentData;
      let text = `✨ 生命靈數分析報告\n`;
      text += `姓名：${d.name}\n`;
      text += `出生：${d.year}/${d.month}/${d.day}\n\n`;
      text += `【五大核心數字】\n`;
      text += `先天數(Life Path)：${d.lifePath}\n`;
      text += `命運數(Expression)：${d.destiny}\n`;
      text += `靈魂數(Soul Urge)：${d.soul}\n`;
      text += `個性數(Personality)：${d.personality}\n`;
      text += `生日數(Birthday)：${d.birthday.main}（${d.birthday.raw}日）\n\n`;
      text += `【性格特質】\n${lifePathDesc[d.lifePath] || ''}\n\n`;
      text += `【事業方向】\n${(careerRecs[d.destiny] || []).join('、')}\n\n`;
      text += `【感情建議】\n${((loveAdvice[d.soul] || loveAdvice[9]) || []).slice(0, 5).map(l => '• ' + l).join('\n')}\n\n`;
      text += `【${currentYear}年度流年】(${d.personalYear})\n${yearMeanings[d.personalYear] || ''}\n`;
      text += `\n產生於生命靈數分析器`;
      
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }
    
    function shareReport() {
      if (!currentData) return;
      const d = currentData;
      const params = new URLSearchParams({
        n: d.name,
        y: d.year,
        m: d.month,
        d: d.day
      });
      const url = `${location.origin}${location.pathname}?${params.toString()}`;
      document.getElementById('shareUrl').textContent = url;
      document.getElementById('shareUrl').classList.add('show');
    }
    
    function resetAnalysis() {
      document.getElementById('inputSection').style.display = 'block';
      document.getElementById('report').classList.remove('show');
      document.getElementById('shareUrl').classList.remove('show');
      currentData = null;
    }
    
    // Auto-fill from URL params
    function checkUrlParams() {
      const params = new URLSearchParams(location.search);
      if (params.has('n') && params.has('y') && params.has('m') && params.has('d')) {
        document.getElementById('nameInput').value = params.get('n');
        document.getElementById('birthYear').value = params.get('y');
        document.getElementById('birthMonth').value = params.get('m');
        document.getElementById('birthDay').value = params.get('d');
        analyze();
      }
    }
    
    checkUrlParams();
  </script>
